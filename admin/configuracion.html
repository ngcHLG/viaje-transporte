<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración General - Administración</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="admin-body">
    <div id="sidebarContainer"></div>
    <main class="main-content">
        <h2 class="mb-4"><i class="bi bi-sliders me-2"></i>Configuración General</h2>

        <form id="formConfiguracion">
            <!-- Datos de la agencia -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-building me-2"></i>Datos de la agencia</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <label class="form-label">Nombre de la agencia</label>
                            <input type="text" class="form-control" id="confAgenciaNombre" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Email de contacto</label>
                            <input type="email" class="form-control" id="confAgenciaEmail" required>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Teléfono de contacto</label>
                            <input type="text" class="form-control" id="confAgenciaTelefono" required>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Horarios y anticipación -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-clock-history me-2"></i>Horarios y anticipación</h5>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label">Días de operación</label>
                            <div class="row row-cols-2 g-2">
                                <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" id="diaLunes"><label class="form-check-label small">Lunes</label></div></div>
                                <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" id="diaMartes"><label class="form-check-label small">Martes</label></div></div>
                                <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" id="diaMiercoles"><label class="form-check-label small">Miércoles</label></div></div>
                                <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" id="diaJueves"><label class="form-check-label small">Jueves</label></div></div>
                                <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" id="diaViernes"><label class="form-check-label small">Viernes</label></div></div>
                                <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" id="diaSabado"><label class="form-check-label small">Sábado</label></div></div>
                                <div class="col"><div class="form-check"><input class="form-check-input" type="checkbox" id="diaDomingo"><label class="form-check-label small">Domingo</label></div></div>
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Hora de apertura</label>
                            <input type="time" class="form-control" id="confHoraApertura">
                        </div>
                        <div class="col-12 col-md-6">
                            <label class="form-label">Hora de cierre</label>
                            <input type="time" class="form-control" id="confHoraCierre">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Anticipación máxima (días)</label>
                            <input type="number" class="form-control" id="confAnticipacion" min="1" max="365" value="30">
                            <small class="text-secondary">Cuántos días en el futuro se pueden reservar.</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Plantillas de notificación -->
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-chat-square-text me-2"></i>Plantillas de notificación</h5>
                </div>
                <div class="card-body">
                    <p class="text-secondary small">Variables disponibles: <code>{nombre}</code>, <code>{codigo}</code>, <code>{ruta}</code>, <code>{fecha}</code>, <code>{hora}</code>, <code>{vehiculo}</code>, <code>{chofer}</code></p>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Solicitud recibida (pendiente)</label>
                            <textarea class="form-control" id="plantillaPendiente" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Reserva confirmada</label>
                            <textarea class="form-control" id="plantillaConfirmada" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">En tránsito</label>
                            <textarea class="form-control" id="plantillaEnTransito" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Completada</label>
                            <textarea class="form-control" id="plantillaCompletada" rows="2"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Cancelada</label>
                            <textarea class="form-control" id="plantillaCancelada" rows="2"></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mb-4">
                <button type="submit" class="btn btn-primary w-100 w-md-auto">
                    <i class="bi bi-check-lg me-2"></i>Guardar configuración
                </button>
                <button type="button" class="btn btn-outline-secondary w-100 w-md-auto" id="btnRestablecer">
                    <i class="bi bi-arrow-counterclockwise me-2"></i>Restablecer valores predeterminados
                </button>
            </div>
        </form>
    </main>

    <!-- Modal de confirmación -->
    <div class="modal fade" id="modalMensaje" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalMensajeTitulo"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalMensajeCuerpo"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-config.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // (El script se mantiene exactamente igual al que ya tienes)
        const defaults = {
            agenciaNombre: 'Viajes Transporte',
            agenciaEmail: 'info@viajestransporte.cu',
            agenciaTelefono: '+53 5XXX XXXX',
            diasOperacion: [1, 2, 3, 4, 5, 6],
            horaApertura: '06:00',
            horaCierre: '22:00',
            anticipacion: 30,
            plantillas: {
                pendiente: 'Hola {nombre}, tu solicitud {codigo} para {ruta} el {fecha} ha sido recibida. Te avisaremos cuando sea confirmada.',
                confirmada: '¡Buena noticia! Tu viaje {codigo} de {ruta} el {fecha} a las {hora} está CONFIRMADO. Vehículo: {vehiculo}. Chófer: {chofer}.',
                en_transito: 'Tu viaje {codigo} ha comenzado. El vehículo {vehiculo} está en ruta hacia {destino}.',
                completada: 'Tu viaje {codigo} ha finalizado. Gracias por viajar con nosotros.',
                cancelada: 'Lamentamos informarte que tu solicitud {codigo} ha sido cancelada. Contacta con nosotros para más detalles.'
            }
        };

        async function cargarConfiguracion() {
            const { data, error } = await window.supabaseClient
                .from('configuracion')
                .select('datos')
                .eq('id', 1)
                .single();
            const config = (error || !data) ? defaults : data.datos;

            document.getElementById('confAgenciaNombre').value = config.agenciaNombre || '';
            document.getElementById('confAgenciaEmail').value = config.agenciaEmail || '';
            document.getElementById('confAgenciaTelefono').value = config.agenciaTelefono || '';
            document.getElementById('confHoraApertura').value = config.horaApertura || '';
            document.getElementById('confHoraCierre').value = config.horaCierre || '';
            document.getElementById('confAnticipacion').value = config.anticipacion || 30;

            const diasIds = ['diaLunes', 'diaMartes', 'diaMiercoles', 'diaJueves', 'diaViernes', 'diaSabado', 'diaDomingo'];
            diasIds.forEach((id, index) => {
                document.getElementById(id).checked = (config.diasOperacion || []).includes(index + 1);
            });

            document.getElementById('plantillaPendiente').value = config.plantillas?.pendiente || '';
            document.getElementById('plantillaConfirmada').value = config.plantillas?.confirmada || '';
            document.getElementById('plantillaEnTransito').value = config.plantillas?.en_transito || '';
            document.getElementById('plantillaCompletada').value = config.plantillas?.completada || '';
            document.getElementById('plantillaCancelada').value = config.plantillas?.cancelada || '';
        }

        async function guardarConfiguracion() {
            const diasIds = ['diaLunes', 'diaMartes', 'diaMiercoles', 'diaJueves', 'diaViernes', 'diaSabado', 'diaDomingo'];
            const diasOperacion = [];
            diasIds.forEach((id, index) => {
                if (document.getElementById(id).checked) {
                    diasOperacion.push(index + 1);
                }
            });

            const config = {
                agenciaNombre: document.getElementById('confAgenciaNombre').value,
                agenciaEmail: document.getElementById('confAgenciaEmail').value,
                agenciaTelefono: document.getElementById('confAgenciaTelefono').value,
                diasOperacion,
                horaApertura: document.getElementById('confHoraApertura').value,
                horaCierre: document.getElementById('confHoraCierre').value,
                anticipacion: parseInt(document.getElementById('confAnticipacion').value) || 30,
                plantillas: {
                    pendiente: document.getElementById('plantillaPendiente').value,
                    confirmada: document.getElementById('plantillaConfirmada').value,
                    en_transito: document.getElementById('plantillaEnTransito').value,
                    completada: document.getElementById('plantillaCompletada').value,
                    cancelada: document.getElementById('plantillaCancelada').value
                }
            };

            const { error } = await window.supabaseClient
                .from('configuracion')
                .upsert({ id: 1, datos: config }, { onConflict: 'id' });

            if (error) {
                mostrarMensaje('Error', 'No se pudo guardar la configuración: ' + error.message);
            } else {
                mostrarMensaje('Configuración guardada', 'Los cambios se han almacenado correctamente.');
            }
        }

        function restablecerDefaults() {
            if (!confirm('¿Restablecer todos los valores a los predeterminados? Se perderán los cambios no guardados.')) return;

            const config = defaults;
            document.getElementById('confAgenciaNombre').value = config.agenciaNombre;
            document.getElementById('confAgenciaEmail').value = config.agenciaEmail;
            document.getElementById('confAgenciaTelefono').value = config.agenciaTelefono;
            document.getElementById('confHoraApertura').value = config.horaApertura;
            document.getElementById('confHoraCierre').value = config.horaCierre;
            document.getElementById('confAnticipacion').value = config.anticipacion;

            const diasIds = ['diaLunes', 'diaMartes', 'diaMiercoles', 'diaJueves', 'diaViernes', 'diaSabado', 'diaDomingo'];
            diasIds.forEach((id, index) => {
                document.getElementById(id).checked = config.diasOperacion.includes(index + 1);
            });

            document.getElementById('plantillaPendiente').value = config.plantillas.pendiente;
            document.getElementById('plantillaConfirmada').value = config.plantillas.confirmada;
            document.getElementById('plantillaEnTransito').value = config.plantillas.en_transito;
            document.getElementById('plantillaCompletada').value = config.plantillas.completada;
            document.getElementById('plantillaCancelada').value = config.plantillas.cancelada;
        }

        function mostrarMensaje(titulo, mensaje) {
            document.getElementById('modalMensajeTitulo').textContent = titulo;
            document.getElementById('modalMensajeCuerpo').textContent = mensaje;
            new bootstrap.Modal(document.getElementById('modalMensaje')).show();
        }

        document.addEventListener('DOMContentLoaded', function() {
            cargarConfiguracion();
            document.getElementById('formConfiguracion').addEventListener('submit', function(e) {
                e.preventDefault();
                guardarConfiguracion();
            });
            document.getElementById('btnRestablecer').addEventListener('click', restablecerDefaults);
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
